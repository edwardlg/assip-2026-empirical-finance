# =====================================================================
# ASSIP 2026 - Dual-deploy GitHub Actions workflow
# ---------------------------------------------------------------------
# This single job builds BOTH sites and publishes them together to the
# gh-pages branch so the deployed Pages site looks like:
#
#   https://<owner>.github.io/<repo>/                  -> MkDocs wiki (root)
#   https://<owner>.github.io/<repo>/textbook/         -> Quarto book (HTML)
#   https://<owner>.github.io/<repo>/textbook/<book>.pdf -> Quarto book (PDF)
#   https://<owner>.github.io/<repo>/decks/week-*.pptx -> PowerPoint decks
#
# Build layout (locally and on CI):
#   _site/                  <- wiki (mkdocs build --site-dir ../_site/) [built FIRST]
#   _site/textbook/         <- book HTML + PDF (quarto render --to html|pdf) [built SECOND]
#   _site/decks/            <- PPTX decks per week with speaker notes
#
# Triggers:
#   - push to main
#   - manual dispatch ("Run workflow" button on the Actions tab)
#
# After this workflow first succeeds, enable GitHub Pages in
# Settings -> Pages, with:
#   Source:  Deploy from a branch
#   Branch:  gh-pages   /  (root)
# =====================================================================
name: Build and deploy ASSIP wiki + textbook

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one Pages deployment at a time; later pushes wait for the in-flight
# build to finish rather than cancelling it (we don't want a half-published
# site if the user pushes twice in quick succession).
concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write   # peaceiris/actions-gh-pages pushes to gh-pages

jobs:
  build-and-deploy:
    name: Build wiki + textbook and publish to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history; needed for git-revision-date plugin

      # ------------------------------------------------------------------
      # MkDocs (Python) toolchain
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: wiki/requirements.txt

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install -r wiki/requirements.txt

      # ------------------------------------------------------------------
      # Quarto toolchain (with TinyTeX for PDF rendering)
      # ------------------------------------------------------------------
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true   # required for PDF format (xelatex)

      - name: Quarto check (diagnostic)
        run: quarto check

      # ------------------------------------------------------------------
      # Build: MkDocs first (writes to _site/ at root), then Quarto writes
      # to _site/textbook. Order matters only in that the wiki build must
      # NOT delete the textbook subdir; mkdocs writes files into the
      # target directory and only clears its own previously-built files,
      # so the /textbook subtree is preserved.
      # ------------------------------------------------------------------
      - name: Build MkDocs wiki -> _site/ (root)
        working-directory: wiki
        run: mkdocs build --site-dir ../_site/

      - name: Render Quarto textbook -> _site/textbook/ (HTML)
        run: quarto render --to html

      - name: Render Quarto textbook -> _site/textbook/ (PDF)
        run: quarto render --to pdf

      # ---- Per-week PowerPoint decks (with speaker notes) --------------
      - name: Render decks -> book/decks/*.pptx
        run: |
          set -e
          mkdir -p _site/decks
          shopt -s nullglob
          for f in book/decks/week-*.qmd; do
            echo "::group::Rendering $f"
            quarto render "$f" --to pptx
            base="$(basename "$f" .qmd)"
            if [ -f "book/decks/${base}.pptx" ]; then
              cp "book/decks/${base}.pptx" "_site/decks/${base}.pptx"
            fi
            echo "::endgroup::"
          done
          echo "Decks copied to _site/decks/:"
          ls -la _site/decks/ || true

      - name: List built site (diagnostic)
        run: |
          echo "::group::Top-level _site/"
          ls -la _site/ || true
          echo "::endgroup::"
          echo "::group::_site/textbook/"
          ls -la _site/textbook/ 2>/dev/null | head -40 || true
          echo "::endgroup::"
          echo "::group::_site/decks/"
          ls -la _site/decks/ 2>/dev/null || true
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Publish to gh-pages
      # ------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Publish ${{ github.sha }}"
